# Pre-commit configuration for zentity monorepo
# See https://pre-commit.com for more information

# Stop at first failure to save time
fail_fast: true

# Auto-install both pre-commit and commit-msg hooks
default_install_hook_types: [pre-commit, commit-msg]

# Minimum version requirement
minimum_pre_commit_version: "3.0.0"

repos:
  # ===========================================
  # Security
  # ===========================================
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  # ===========================================
  # General file hygiene
  # ===========================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^(apps/.*/dist/|dist/|.*\.patch$)
      - id: end-of-file-fixer
        exclude: ^(apps/.*/dist/|dist/)
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: pnpm-lock\.yaml$
      - id: check-toml
      - id: check-json
        exclude: (^\.vscode/|tsconfig.*\.json$|/\.oxlintrc\.json$)  # JSONC files (VSCode, TypeScript, oxlint)
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
        exclude: ^apps/.*/(vendor|patches)/
      - id: check-case-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

  # ===========================================
  # Lockfile sync checks
  # ===========================================
  - repo: local
    hooks:
      - id: lockfile-sync-web
        name: pnpm lockfile sync (web)
        entry: bash -c 'cd apps/web && pnpm install --frozen-lockfile'
        language: system
        files: ^apps/web/package\.json$
        pass_filenames: false
      - id: lockfile-sync-demo-rp
        name: pnpm lockfile sync (demo-rp)
        entry: bash -c 'cd apps/demo-rp && pnpm install --frozen-lockfile'
        language: system
        files: ^apps/demo-rp/package\.json$
        pass_filenames: false
      - id: lockfile-sync-landing
        name: pnpm lockfile sync (landing)
        entry: bash -c 'cd apps/landing && pnpm install --frozen-lockfile'
        language: system
        files: ^apps/landing/package\.json$
        pass_filenames: false
      - id: lockfile-sync-mcp
        name: pnpm lockfile sync (mcp)
        entry: bash -c 'cd apps/mcp && pnpm install --frozen-lockfile'
        language: system
        files: ^apps/mcp/package\.json$
        pass_filenames: false
      - id: lockfile-sync-fhe
        name: Cargo lockfile sync (fhe)
        entry: bash -c 'cd apps/fhe && cargo check --locked 2>&1 | tail -3'
        language: system
        files: ^apps/fhe/Cargo\.toml$
        pass_filenames: false
      - id: lockfile-sync-signer
        name: Cargo lockfile sync (signer)
        entry: bash -c 'cd apps/signer && cargo check --locked 2>&1 | tail -3'
        language: system
        files: ^apps/signer/Cargo\.toml$
        pass_filenames: false

  # ===========================================
  # Web app — decomposed checks (each hook has a scoped file filter)
  # fail_fast: true stops at the first failure. Hook order is cheapest-first
  # so fast failures short-circuit the expensive next build.
  # ===========================================
  - repo: local
    hooks:
      - id: biome-check-web
        name: biome check (web) — lint + format
        entry: bash -c 'cd apps/web && pnpm run lint:check'
        language: system
        files: ^apps/web/.*\.(ts|tsx|js|jsx|json|css)$
        pass_filenames: false
      - id: tsc-check-web
        name: TypeScript type-check (web)
        entry: bash -c 'cd apps/web && pnpm run type-check'
        language: system
        files: ^apps/web/.*\.(ts|tsx)$
        pass_filenames: false
      - id: knip-check-web
        name: Knip dead-code check (web)
        entry: bash -c 'cd apps/web && pnpm run knip'
        language: system
        files: ^apps/web/.*\.(ts|tsx)$
        pass_filenames: false
      - id: oxlint-type-aware-web
        name: Oxlint type-aware (web) — catches @deprecated, floating promises, await-thenable
        entry: bash -c 'cd apps/web && pnpm run lint:types'
        language: system
        files: ^apps/web/src/.*\.(ts|tsx)$
        pass_filenames: false
      - id: circuits-check-web
        name: Noir circuit version check (web)
        entry: bash -c 'cd apps/web && pnpm run circuits:check-versions'
        language: system
        files: ^apps/web/noir-circuits/.*|^apps/web/package\.json$
        pass_filenames: false
      - id: next-build-web
        name: next build (web) — catches "use client" / "server-only" boundary bugs
        entry: bash -c 'cd apps/web && pnpm run build'
        language: system
        files: ^apps/web/.*\.(ts|tsx|js|jsx|json|css)$
        pass_filenames: false
      - id: vitest-unit-web
        name: vitest unit tests (web) — ~2 min
        entry: bash -c 'cd apps/web && pnpm test:unit'
        language: system
        files: ^apps/web/.*\.(ts|tsx)$
        pass_filenames: false
      - id: vitest-integration-web
        name: vitest integration tests (web) — ~5 min
        entry: bash -c 'cd apps/web && pnpm test:integration'
        language: system
        files: ^apps/web/.*\.(ts|tsx)$
        pass_filenames: false

  # ===========================================
  # TypeScript/JavaScript (apps/landing)
  # ===========================================
  - repo: local
    hooks:
      - id: biome-check-landing
        name: biome-check (landing)
        entry: bash -c 'cd apps/landing && pnpm run lint:fix'
        language: system
        files: ^apps/landing/.*\.(ts|tsx|js|jsx|json|css)$
        pass_filenames: false
      - id: tsc-check-landing
        name: TypeScript type-check (landing)
        entry: bash -c 'cd apps/landing && pnpm run type-check'
        language: system
        files: ^apps/landing/.*\.(ts|tsx)$
        pass_filenames: false

  # ===========================================
  # TypeScript/JavaScript (apps/mcp)
  # ===========================================
  - repo: local
    hooks:
      - id: mcp-test
        name: MCP tests
        entry: bash -c 'cd apps/mcp && pnpm test'
        language: system
        files: ^apps/mcp/.*\.(ts|tsx|js|jsx)$
        pass_filenames: false

  # ===========================================
  # Markdown (repo-wide)
  # ===========================================
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.47.0
    hooks:
      - id: markdownlint
        args: [--fix]
        exclude: node_modules/

  # ===========================================
  # Python (apps/ocr)
  # ===========================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.9
    hooks:
      - id: ruff-check
        args: [--fix]
        files: ^apps/ocr/
      - id: ruff-format
        files: ^apps/ocr/

  # ===========================================
  # Rust (apps/fhe)
  # ===========================================
  - repo: local
    hooks:
      - id: cargo-fmt-fhe
        name: cargo fmt (fhe)
        entry: cargo fmt --manifest-path apps/fhe/Cargo.toml --
        language: system
        files: ^apps/fhe/.*\.rs$
        pass_filenames: false
      - id: cargo-clippy-fhe
        name: cargo clippy (fhe)
        entry: cargo clippy --manifest-path apps/fhe/Cargo.toml -- -D warnings
        language: system
        files: ^apps/fhe/.*\.rs$
        pass_filenames: false

  # ===========================================
  # Rust (apps/signer)
  # ===========================================
  - repo: local
    hooks:
      - id: cargo-fmt-signer
        name: cargo fmt (signer)
        entry: cargo fmt --manifest-path apps/signer/Cargo.toml --
        language: system
        files: ^apps/signer/.*\.rs$
        pass_filenames: false
      - id: cargo-clippy-signer
        name: cargo clippy (signer)
        entry: cargo clippy --manifest-path apps/signer/Cargo.toml -- -D warnings
        language: system
        files: ^apps/signer/.*\.rs$
        pass_filenames: false

  # ===========================================
  # Commit message validation
  # ===========================================
  - repo: local
    hooks:
      - id: commitlint
        name: commitlint
        entry: bash -c 'NODE_PATH=apps/web/node_modules apps/web/node_modules/.bin/commitlint --edit "$0"'
        language: system
        stages: [commit-msg]
