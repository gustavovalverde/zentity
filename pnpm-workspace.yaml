packages:
  - apps/*
  - packages/*

allowBuilds:
  '@prisma/engines': false
  '@reown/appkit': true
  '@synthetixio/synpress-cache': true
  '@tensorflow/tfjs-node': true
  bufferutil: false
  core-js: false
  esbuild: true
  keccak: false
  msgpackr-extract: false
  msw: true
  prisma: false
  protobufjs: true
  sharp: false
  unrs-resolver: false
  utf-8-validate: false

patchedDependencies:
  '@better-auth/oauth-provider@1.7.0-beta.8': patches/@better-auth__oauth-provider@1.7.0-beta.8.patch
  '@daveyplate/better-auth-ui': apps/web/vendor/@daveyplate__better-auth-ui.patch

overrides:
  '@walletconnect/logger': 3.0.1
  'tar@<7.5.11': 7.5.11
  'axios@<1.16.1': 1.16.1
  'qs@<6.15.2': 6.15.2
  'ws@<8.20.1': 8.20.1
  'hono@<4.12.18': 4.12.18
  '@hono/node-server@<2.0.2': 2.0.2
  'undici@<7.24.0': 7.24.0
  'fast-xml-parser@<5.8.0': 5.8.0
  'fast-xml-builder@<1.2.0': 1.2.0
  'follow-redirects@<1.16.0': 1.16.0
  'node-forge@<1.4.0': 1.4.0
  'protobufjs@<7.5.8': 7.5.8
  '@protobufjs/utf8@<=1.1.0': 1.1.1
  'dompurify@<3.4.0': 3.4.0
  'express-rate-limit@<8.2.2': 8.2.2
  'path-to-regexp@>=8 <8.4.0': 8.4.0
  'postcss@<8.5.14': 8.5.14
  'kysely@>=0.26.0 <0.28.17': 0.28.17
  'fast-uri@<=3.1.1': 3.1.2
  '@tootallnate/once@<3.0.1': 3.0.1
  'uuid@>=11.0.0 <11.1.1': 11.1.1
  'ip-address@<=10.1.0': 10.2.0
  'lodash-es@<=4.17.23': 4.18.1
  'bn.js@>=5.0.0 <5.2.3': 5.2.3
  'ajv@>=7.0.0-alpha.0 <8.18.0': 8.20.0
  'glob@>=10.2.0 <10.5.0': 10.5.0
  'tsup@<=8.3.4': 8.5.1
  'esbuild@<=0.24.2': 0.28.0

packageExtensions:
  '@better-auth/ciba':
    dependencies:
      '@better-auth/core': '*'
      '@better-auth/oauth-provider': '*'
  '@better-auth/haip':
    dependencies:
      '@better-auth/core': '*'
  '@better-auth/oidc4ida':
    dependencies:
      '@better-auth/core': '*'
  '@better-auth/oidc4vci':
    dependencies:
      '@better-auth/core': '*'
  '@better-auth/oidc4vp':
    dependencies:
      '@better-auth/core': '*'
