# yaml-language-server: $schema=https://railway.com/railway.schema.json
# Web Service - Next.js on port 3000
# Public domain: app.zentity.xyz
#
# ── Required secrets (app crashes without these) ─────────────────────────
#   NODE_ENV=production
#   BETTER_AUTH_SECRET=<secret>            # min 32 chars
#   BETTER_AUTH_URL=https://app.zentity.xyz
#   OPAQUE_SERVER_SETUP=<secret>           # generated by `pnpm setup`
#   INTERNAL_SERVICE_TOKEN=<secret>        # min 32 chars, shared across services
#   DEDUP_HMAC_SECRET=<secret>             # min 32 chars, sybil dedup & per-RP nullifiers
#   PAIRWISE_SECRET=<secret>               # min 32 chars, HAIP pairwise subject IDs
#   KEY_ENCRYPTION_KEY=<secret>            # min 32 chars, AES-256-GCM for JWKS at rest
#
# ── Database ─────────────────────────────────────────────────────────────
#   TURSO_DATABASE_URL=libsql://<db>.turso.io
#   TURSO_AUTH_TOKEN=<secret>
#
# ── Internal services ────────────────────────────────────────────────────
#   FHE_SERVICE_URL=http://fhe.railway.internal:5001
#   OCR_SERVICE_URL=http://ocr.railway.internal:5004
#   SIGNER_COORDINATOR_URL=http://signer-coordinator.railway.internal:5002
#   SIGNER_ENDPOINTS=http://signer-1.railway.internal:5101,http://signer-2.railway.internal:5101,http://signer-3.railway.internal:5101
#
# ── Web Push (VAPID) ────────────────────────────────────────────────────
#   VAPID_PUBLIC_KEY=<vapid-key>           # generated by `pnpm setup`
#   VAPID_PRIVATE_KEY=<vapid-key>          # generated by `pnpm setup`
#   NEXT_PUBLIC_VAPID_PUBLIC_KEY=<same-as-VAPID_PUBLIC_KEY>  # build arg, baked into client
#
# ── Email ────────────────────────────────────────────────────────────────
#   RESEND_API_KEY=<resend-key>            # required in production
#   MAIL_FROM_EMAIL=no-reply@zentity.xyz
#
# ── Recovery ─────────────────────────────────────────────────────────────
#   RECOVERY_ML_KEM_SECRET_KEY=<base64>    # ML-KEM-768, 2400 bytes base64-encoded
#   CUSTODIAL_SIGNER_URL=<url>             # optional, zero-friction recovery
#   CUSTODIAL_SIGNER_ID=<signer-id>        # optional, paired with CUSTODIAL_SIGNER_URL
#
# ── Build args (baked into client bundle) ────────────────────────────────
#   NEXT_PUBLIC_OPAQUE_SERVER_PUBLIC_KEY=<key>  # generated by `pnpm setup`
#   (NEXT_PUBLIC_VAPID_PUBLIC_KEY — see Web Push above)
#
# ── Infrastructure paths ─────────────────────────────────────────────────
#   NEXT_PUBLIC_APP_URL=https://app.zentity.xyz
#   NEXT_PUBLIC_COOP=same-origin
#   BB_CRS_PATH=/var/lib/zentity/bb-crs
#   SECRET_BLOB_DIR=/var/lib/zentity/web/secret-blobs
#
# ── Optional ─────────────────────────────────────────────────────────────
#   TRUSTED_ORIGINS=<comma-separated>      # additional CORS origins
#   DPOP_NONCE_TTL_SECONDS=30
#   TRUSTED_WALLET_ISSUERS=<comma-separated>
#   VAPID_SUBJECT=mailto:notifications@zentity.xyz
#   ZENTITY_ADMIN_API_KEY=<secret>         # protects admin tRPC routes
#
# ── Volumes (create via Railway dashboard) ───────────────────────────────
#   bb-crs-cache → /var/lib/zentity/bb-crs
#     - Persists Barretenberg CRS cache across restarts
#   web-data → /var/lib/zentity/web
#     - Persists secret blobs and SQLite (if using file: DB)
#
# Schema apply (run from CI/local machine):
#   TURSO_DATABASE_URL=libsql://<db>.turso.io TURSO_AUTH_TOKEN=<secret> pnpm run db:push

[build]
builder = "DOCKERFILE"

[build.args]
NEXT_PUBLIC_APP_URL = "https://app.zentity.xyz"
NEXT_PUBLIC_ZKPASSPORT_ENABLED = "true"

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "ALWAYS"
numReplicas = 1
