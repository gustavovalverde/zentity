name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  RUST_TOOLCHAIN: "1.92.0"

jobs:
  # ============================================
  # Detect which paths changed (gates downstream jobs)
  # ============================================
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      contents: read
    outputs:
      web: ${{ steps.filter.outputs.web }}
      mcp: ${{ steps.filter.outputs.mcp }}
      python: ${{ steps.filter.outputs.python }}
      rust: ${{ steps.filter.outputs.rust }}
      ci: ${{ steps.filter.outputs.ci }}
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'apps/demo-rp/**'
            mcp:
              - 'apps/mcp/**'
            python:
              - 'apps/ocr/**'
            rust:
              - 'apps/fhe/**'
              - 'apps/signer/**'
            ci:
              - '.github/workflows/test.yml'

  # ============================================
  # Web (apps/web unit + integration, apps/demo-rp)
  # ============================================
  web-test:
    name: Web Tests
    needs: changes
    if: needs.changes.outputs.web == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24"
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.19.0
      - run: pnpm install --frozen-lockfile
        working-directory: apps/web

      - name: Unit tests
        run: pnpm test:unit --coverage
        working-directory: apps/web

      - name: Integration tests
        run: pnpm test:integration
        working-directory: apps/web

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: web-coverage
          path: apps/web/coverage/
          retention-days: 14

      - name: Demo-RP tests
        run: |
          pnpm install --frozen-lockfile
          pnpm test
        working-directory: apps/demo-rp

  # ============================================
  # MCP Server (apps/mcp)
  # ============================================
  mcp-test:
    name: MCP Tests
    needs: changes
    if: needs.changes.outputs.mcp == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: "24"
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.19.0
      - run: pnpm install --frozen-lockfile
        working-directory: apps/mcp
      - run: pnpm test
        working-directory: apps/mcp

  # ============================================
  # Python (apps/ocr)
  # ============================================
  python-test:
    name: Python Tests
    needs: changes
    if: needs.changes.outputs.python == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -e '.[test]'
        working-directory: apps/ocr
      - name: Run tests with coverage
        run: pytest --cov=ocr_service --cov-report=term-missing
        working-directory: apps/ocr
        env:
          PYTHONPATH: src

  # ============================================
  # Rust (apps/fhe + apps/signer)
  # ============================================
  rust-test:
    name: Rust Tests
    needs: changes
    if: needs.changes.outputs.rust == 'true' || needs.changes.outputs.ci == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561 # master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
      - name: FHE service tests
        run: cargo test --manifest-path apps/fhe/Cargo.toml
      - name: Signer service tests
        run: cargo test --manifest-path apps/signer/Cargo.toml

  # ============================================
  # Summary
  # ============================================
  summary:
    name: Test Summary
    if: always()
    needs: [changes, web-test, mcp-test, python-test, rust-test]
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        env:
          WEB_RESULT: ${{ needs.web-test.result }}
          MCP_RESULT: ${{ needs.mcp-test.result }}
          PYTHON_RESULT: ${{ needs.python-test.result }}
          RUST_RESULT: ${{ needs.rust-test.result }}
        run: |
          echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Suite | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"

          format_status() {
            case "$1" in
              success)  echo "Passed" ;;
              failure)  echo "Failed" ;;
              skipped)  echo "Skipped (no changes)" ;;
              *)        echo "$1" ;;
            esac
          }

          echo "| Web (unit + integration) | $(format_status "$WEB_RESULT") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| MCP Server | $(format_status "$MCP_RESULT") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Python (OCR) | $(format_status "$PYTHON_RESULT") |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Rust (FHE + Signer) | $(format_status "$RUST_RESULT") |" >> "$GITHUB_STEP_SUMMARY"

          if [ "$WEB_RESULT" = "failure" ] || [ "$MCP_RESULT" = "failure" ] || \
             [ "$PYTHON_RESULT" = "failure" ] || [ "$RUST_RESULT" = "failure" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "One or more test suites failed." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
